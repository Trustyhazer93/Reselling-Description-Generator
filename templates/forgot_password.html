<!DOCTYPE html>
<html>
<head>
<title>Forgot Password - Reseller Descriptions</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f0f12;
    color:#e5e5e5;
    overflow-x:hidden;
    min-height:100vh;
}

/* BACKGROUND TRIANGLE GRID */

.triangle-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    pointer-events:none;
}

.triangle-grid{
    position:absolute;
    width:100%;
    height:100%;
    background-image:
        linear-gradient(60deg,#2a2a2f 1px,transparent 1px),
        linear-gradient(-60deg,#2a2a2f 1px,transparent 1px),
        linear-gradient(0deg,#2a2a2f 1px,transparent 1px);
    background-size:80px 70px;
    opacity:0.35;
}

.triangle-grid::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background-image:radial-gradient(circle,#7a7a7a 1.4px,transparent 2px);
    background-size:80px 70px;
    opacity:0.25;
}

.glow-layer{
    position:absolute;
    width:200%;
    height:200%;
    background:
        radial-gradient(circle at 30% 40%, rgba(120,140,255,0.18), transparent 200px),
        radial-gradient(circle at 70% 70%, rgba(155,107,255,0.18), transparent 220px),
        radial-gradient(circle at 40% 80%, rgba(80,200,255,0.14), transparent 220px);
    animation:glowMove 25s linear infinite;
}

@keyframes glowMove{
    0%{transform:translate(-10%,-10%)}
    50%{transform:translate(-20%,-30%)}
    100%{transform:translate(-10%,-10%)}
}

/* PAGE */

.auth-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px 12px;
    box-sizing:border-box;
}

.auth-card{
    width:100%;
    max-width:420px;
    background:#15151c;
    border:1px solid #26263a;
    border-radius:12px;
    box-shadow:0 0 25px rgba(80,120,255,0.08);
    padding:24px 18px;
    box-sizing:border-box;
}

.brand{
    text-align:center;
    font-size:22px;
    font-weight:700;
    color:#ffffff;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    font-size:14px;
    color:#aeb3c8;
    line-height:1.5;
    margin-bottom:24px;
}

label{
    display:block;
    font-size:13px;
    color:#cfd4ea;
    margin-bottom:6px;
    margin-top:14px;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:12px 14px;
    border-radius:8px;
    border:1px solid #303048;
    background:#111118;
    color:#e5e5e5;
    font-size:15px;
    outline:none;
}

input:focus{
    border-color:#6dd5ff;
}

button{
    width:100%;
    margin-top:18px;
    background:linear-gradient(90deg,#4fc3ff,#9b6bff);
    border:none;
    color:white;
    padding:12px 16px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
}

button:hover{
    opacity:0.92;
}

.message{
    background:#13261b;
    border:1px solid #29543a;
    color:#b9f5cb;
    padding:10px 12px;
    border-radius:8px;
    margin-bottom:16px;
    font-size:14px;
}

.error{
    background:#2a1418;
    border:1px solid #5a2a34;
    color:#ffb8c2;
    padding:10px 12px;
    border-radius:8px;
    margin-bottom:16px;
    font-size:14px;
}

.links{
    margin-top:18px;
    text-align:center;
    font-size:14px;
    color:#aeb3c8;
    line-height:1.6;
}

.links a{
    color:#d6d6ff;
    text-decoration:none;
}

.links a:hover{
    color:#6dd5ff;
}

.auth-footer{
    text-align:center;
    margin-top:18px;
    font-size:13px;
    color:#8f97bb;
}

.auth-footer a{
    color:#b8bdd3;
    text-decoration:none;
    margin:0 6px;
}

.auth-footer a:hover{
    color:#6dd5ff;
}

@media (min-width:768px){
    .auth-card{
        padding:30px 28px;
    }
}

</style>
</head>

<body>

<div class="triangle-bg">
    <div class="triangle-grid"></div>
    <div class="glow-layer"></div>
</div>

<div class="auth-wrap">
    <div class="auth-card">
        <div class="brand">Reseller Descriptions</div>
        <div class="subtitle">Enter your email address and we’ll send you a password reset link.</div>

        {% if message %}
        <div class="message">{{ message }}</div>
        {% endif %}

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <button type="submit">Send Reset Link</button>
        </form>

        <div class="links">
            <a href="/login">Back to Log In</a>
        </div>

        <div class="auth-footer">
            <a href="/terms">Terms</a>
            <span>•</span>
            <a href="/privacy">Privacy</a>
            <span>•</span>
            <a href="mailto:support@resellerdescriptions.com">Support</a>
        </div>
    </div>
</div>

</body>
</html>
