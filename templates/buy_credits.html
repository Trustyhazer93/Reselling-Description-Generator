<!DOCTYPE html>
<html>
<head>
<title>Buy Credits</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f0f12;
color:#e5e5e5;
overflow-x:hidden;
}

/* BACKGROUND */

.triangle-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

.triangle-grid{
position:absolute;
width:100%;
height:100%;
background-image:
linear-gradient(60deg,#2a2a2f 1px,transparent 1px),
linear-gradient(-60deg,#2a2a2f 1px,transparent 1px),
linear-gradient(0deg,#2a2a2f 1px,transparent 1px);
background-size:80px 70px;
opacity:0.35;
}

.triangle-grid::after{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:radial-gradient(circle,#8a8a8a 1.5px,transparent 2px);
background-size:80px 70px;
opacity:0.4;
}

.glow-layer{
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle at 30% 40%, rgba(120,140,255,0.25), transparent 200px),
radial-gradient(circle at 70% 70%, rgba(155,107,255,0.25), transparent 200px),
radial-gradient(circle at 40% 80%, rgba(80,200,255,0.2), transparent 220px);
animation:glowMove 25s linear infinite;
}

@keyframes glowMove{
0%{transform:translate(-10%,-10%)}
50%{transform:translate(-20%,-30%)}
100%{transform:translate(-10%,-10%)}
}

/* CONTAINER */

.container{
max-width:700px;
margin:auto;
padding:30px;
margin-top:60px;
background:#15151c;
border:1px solid #26263a;
border-radius:10px;
box-shadow:0 0 25px rgba(80,120,255,0.08);
}

/* CREDIT OPTION BOX */

.credit-option{
width:100%;
background:#111118;
border:1px solid #26263a;
border-radius:8px;
padding:20px;
margin-bottom:16px;
cursor:pointer;
transition:all 0.2s ease;
text-align:left;
}

.credit-option:hover{
border-color:#6dd5ff;
box-shadow:0 0 15px rgba(100,180,255,0.35);
}

/* TEXT */

.price{
font-size:28px;
font-weight:bold;
margin-bottom:4px;
}

.credits{
font-size:16px;
color:#a0a0ff;
margin-bottom:6px;
}

.small-text{
font-size:12px;
color:#8f97bb;
}

/* BUTTON RESET */

.credit-option button{
all:unset;
display:block;
width:100%;
cursor:pointer;
}

</style>
</head>

<body>

<div class="triangle-bg">
<div class="triangle-grid"></div>
<div class="glow-layer"></div>
</div>

<div class="container">

<h2>Buy Credits</h2>
<p style="color:#9aa6ff;margin-bottom:25px;">
Generate AI descriptions for your listings
</p>

<!-- 50 CREDITS -->

<form method="POST" action="/buy-credits">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input type="hidden" name="pack" value="50">

<div class="credit-option" onclick="this.closest('form').submit()">

<button>

<div class="price">£5</div>
<div class="credits">50 Credits</div>
<div class="small-text">
Perfect for casual sellers
</div>

</button>

</div>

</form>

<!-- 200 CREDITS -->

<form method="POST" action="/buy-credits">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input type="hidden" name="pack" value="200">

<div class="credit-option" onclick="this.closest('form').submit()">

<button>

<div class="price">£15</div>
<div class="credits">200 Credits</div>
<div class="small-text">
Best value for regular resellers
</div>

</button>

</div>

</form>

<!-- 600 CREDITS -->

<form method="POST" action="/buy-credits">

<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input type="hidden" name="pack" value="600">

<div class="credit-option" onclick="this.closest('form').submit()">

<button>

<div class="price">£35</div>
<div class="credits">600 Credits</div>
<div class="small-text">
For power sellers with large inventories
</div>

</button>

</div>

</form>

</div>

</body>
</html>
